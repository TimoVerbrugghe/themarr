name: Sanitize screenshot changes

# Screenshots are auto-generated on main by screenshots.yml.
# This workflow removes direct screenshots/ changes from branch commits/PRs to
# avoid binary merge conflicts.
on:
  pull_request:
    branches:
      - main
    paths:
      - 'screenshots/**'
  push:
    branches-ignore:
      - main
    paths:
      - 'screenshots/**'

permissions: {}

concurrency:
  group: sanitize-screenshots-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sanitize-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore screenshots from base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          git restore --source "origin/$BASE_REF" --staged --worktree screenshots/
          git add -A screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to sanitize."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove screenshots from PR branch [skip ci]"
          git push

  sanitize-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore screenshots from default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "$DEFAULT_BRANCH"
          git restore --source "origin/$DEFAULT_BRANCH" --staged --worktree screenshots/
          git add -A screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes to sanitize."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove screenshots from branch commit [skip ci]"
          git push

  forks-note:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Fail fork PRs that change screenshots
        run: |
          echo "::error::This PR includes screenshots/ changes, but workflow cannot push fixes to forks."
          echo "::error::Please remove screenshots/ changes from the PR branch."
          exit 1
