name: Dependency review

on:
  pull_request:
    branches:
      - main
    paths:
      - 'requirements*.txt'
      - 'Dockerfile'

permissions: {}

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required to post inline PR comments on findings

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs that introduce HIGH or CRITICAL severity vulnerabilities
          fail-on-severity: high
          # Post a summary comment on the PR listing affected packages
          comment-summary-in-pr: always
          # Block packages with known malware or typosquatting
          deny-packages: ''
          # Allow licenses compatible with this project
          allow-licenses: MIT, HPND, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Python-2.0, LGPL-2.1-only, LGPL-3.0-only
