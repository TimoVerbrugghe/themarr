name: Container vulnerability scan

# Runs after docker-publish.yml pushes a new image to GHCR,
# and also on a weekly schedule to catch newly-disclosed CVEs
# against already-published images.
on:
  workflow_run:
    workflows: ["Build and publish Docker image"]
    types: [completed]
    branches: [main]
  schedule:
    # Every Tuesday at 08:00 UTC — offset from Dependabot (Monday) so fixes
    # can be merged before the weekly scan alarm fires.
    - cron: '0 8 * * 2'

permissions: {}

jobs:
  scan:
    name: Scan published image
    # Only run if the triggering workflow succeeded (or if it's a scheduled run)
    if: >
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write    # Upload SARIF to Security tab
      packages: read            # Pull image from GHCR

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:main" >> "$GITHUB_ENV"

      - name: Pull image
        run: docker pull "$IMAGE"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          # Do NOT use exit-code here; scanning published images is advisory.
          # The build-time scan (in docker-publish.yml) is the enforcement gate.

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container
