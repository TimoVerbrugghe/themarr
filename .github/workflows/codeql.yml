name: CodeQL analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run every Monday at 08:00 UTC to catch newly-published advisories
    - cron: '0 8 * * 1'

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF results

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            category: codeql-python
          - language: javascript-typescript
            category: codeql-javascript

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ matrix.language }}
          # Use the security-extended query suite to catch more vulnerability classes
          # (covers OWASP Top 10 + additional CWEs beyond the default suite)
          queries: security-extended

      # CodeQL auto-builds Python/JS projects; explicit build step is not required.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: ${{ matrix.category }}
