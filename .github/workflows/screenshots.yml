name: Update screenshots

# Runs automatically for:
# - Pushes to main (typically after a PR merge) that modify web UI files
#   (commits regenerated screenshots)
# Screenshots are intentionally generated after merge to avoid stale PR timing
# and branch PNG conflicts.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'static/**'
      - 'web_app.py'

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Take screenshots
        run: python3 scripts/take_screenshots.py

      - name: Commit updated screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update screenshots [skip ci]"
          git push
