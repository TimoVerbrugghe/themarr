name: Update screenshots

# Runs automatically for:
# - Pushes to main (typically after a PR merge) that modify web UI files
#   (commits regenerated screenshots)
# Screenshots are intentionally generated after merge to avoid stale PR timing
# and branch PNG conflicts.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'static/**'
      - 'web_app.py'

permissions: {}

concurrency:
  group: screenshots-main
  cancel-in-progress: false

jobs:
  screenshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # token stored via git credential-helper, NOT embedded in remote URL
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Take screenshots
        run: python3 scripts/take_screenshots.py

      - name: Commit updated screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update screenshots [skip ci]"
          git push
