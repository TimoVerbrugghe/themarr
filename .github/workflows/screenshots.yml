name: Update screenshots

# Runs automatically for:
# - PRs that modify web UI files (uploads screenshots as artifact only)
# - Pushes to main that modify web UI files (commits regenerated screenshots)
#
# This keeps screenshots out of PR branches to avoid PNG merge conflicts while
# still keeping screenshots in main up to date after merge.

on:
  pull_request:
    paths:
      - 'templates/**'
      - 'static/**'
      - 'web_app.py'
  push:
    branches:
      - main
    paths:
      - 'templates/**'
      - 'static/**'
      - 'web_app.py'

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout push branch
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Take screenshots
        run: python3 scripts/take_screenshots.py

      - name: Commit updated screenshots (push to main only)
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update screenshots [skip ci]"
          git push

      - name: Upload screenshots as artifact (PRs only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 14
