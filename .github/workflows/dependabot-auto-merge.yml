name: Dependabot auto-merge

on:
  pull_request_target:
    # Restrict to the three events Dependabot actually emits; avoids firing on
    # labeled/closed/edited events which are irrelevant and widen attack surface.
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    # Double guard: reserved [bot] identity + branch-name prefix check.
    # startsWith on head_ref adds defense-in-depth against hypothetical
    # future identity policy changes.
    if: >
      github.actor == 'dependabot[bot]' &&
      startsWith(github.head_ref, 'dependabot/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Approve and auto-merge patch and minor updates only
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major version updates requiring human review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body \
            "⚠️ This Dependabot PR bumps a **major** version. Auto-merge is disabled for major updates — please review and merge manually."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
