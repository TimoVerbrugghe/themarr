name: Dependabot auto-merge

on:
  pull_request_target:
    # Restrict to the three events Dependabot actually emits; avoids firing on
    # labeled/closed/edited events which are irrelevant and widen attack surface.
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    # Double guard: reserved [bot] identity + branch-name prefix check.
    # startsWith on head_ref adds defense-in-depth against hypothetical
    # future identity policy changes.
    if: >
      github.actor == 'dependabot[bot]' &&
      startsWith(github.head_ref, 'dependabot/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Approve and auto-merge Dependabot updates
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
