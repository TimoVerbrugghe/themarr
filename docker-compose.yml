services:
  themarr:
    build: .
    container_name: themarr
    # Security hardening
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    read_only: true
    tty: false
    stdin_open: false
    # Resource limits
    pids_limit: 512
    mem_limit: 1g
    cpus: 1.00
    # tmpfs for runtime directories (writable while root fs is read-only)
    tmpfs:
      - /run:rw,noexec,nosuid,nodev,size=64m
      - /tmp:rw,noexec,nosuid,nodev,size=512m
    environment:
      PLEX_URL: ${PLEX_URL}
      PLEX_TOKEN: ${PLEX_TOKEN}
      JELLYFIN_URL: ${JELLYFIN_URL:-}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      JELLYFIN_USER_ID: ${JELLYFIN_USER_ID:-}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      DEFAULT_THEME: ${DEFAULT_THEME:-dark}
      DEFAULT_VIEW: ${DEFAULT_VIEW:-list}
      API_KEY: ${API_KEY:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      DISABLE_AUTH: ${DISABLE_AUTH:-false}
      WEBHOOK_USERNAME: ${WEBHOOK_USERNAME:-}
      WEBHOOK_PASSWORD: ${WEBHOOK_PASSWORD:-}
    volumes:
      # Mount your media library directories at the SAME path as in your Plex/Jellyfin container.
      # Themarr uses the paths reported by Plex/Jellyfin to locate files on disk, so the
      # container path here must be identical to the path inside your media-server container.
      # Replace these examples with your actual library paths used by your Plex/Jellyfin container.
      - /media/tvshows:/media/tvshows
      - /media/movies:/media/movies
    ports:
      - "8080:8080"
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
