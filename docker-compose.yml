services:
  themarr:
    build: .
    container_name: themarr
    environment:
      PLEX_URL: ${PLEX_URL}
      PLEX_TOKEN: ${PLEX_TOKEN}
      TV_SHOWS_PATH: ${TV_SHOWS_PATH:-/tv}
      TV_PATH: ${TV_PATH:-${TV_SHOWS_PATH:-/tv}}
      MOVIES_PATH: ${MOVIES_PATH:-/movies}
      VERBOSE: ${VERBOSE:-false}
      VERBOSE_MATCHING: ${VERBOSE_MATCHING:-false}
      OVERWRITE: ${OVERWRITE:-false}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
    volumes:
      - ${TV_SHOWS_HOST_PATH:-/mnt/tv}:/tv
      - ${MOVIES_HOST_PATH:-/mnt/movies}:/movies
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
